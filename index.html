<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>100マス計算</title>
  <!-- 配置したfaviconを読み込む設定 -->
  <link rel="icon" type="image/png" href="./favicon.png" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel" data-type="module">
    // アイコンの準備
    const { Calculator, Settings, Play, RefreshCw, Trophy, History, X, CheckCircle, Volume2, VolumeX, Keyboard, BarChart2, Clock, ArrowRight, PenTool, Eraser, MoveHorizontal } = lucide;
    const createIcon = (name) => ({ className, ...props }) => React.createElement('i', { className: `lucide-${name} ${className || ''}`, ...props, dangerouslySetInnerHTML: { __html: lucide.icons[name].toSvg() } });
    
    window.Calculator = createIcon('calculator');
    window.Settings = createIcon('settings');
    window.Play = createIcon('play');
    window.RefreshCw = createIcon('refresh-cw');
    window.Trophy = createIcon('trophy');
    window.History = createIcon('history');
    window.X = createIcon('x');
    window.CheckCircle = createIcon('check-circle');
    window.Volume2 = createIcon('volume-2');
    window.VolumeX = createIcon('volume-x');
    window.Keyboard = createIcon('keyboard');
    window.BarChart2 = createIcon('bar-chart-2');
    window.Clock = createIcon('clock');
    window.ArrowRight = createIcon('arrow-right');
    window.PenTool = createIcon('pen-tool');
    window.Eraser = createIcon('eraser');
    window.MoveHorizontal = createIcon('move-horizontal');
  </script>
  
  <!-- App.jsx を読み込んで表示する -->
  <script type="text/babel" data-type="module" src="./App.jsx"></script>
  
  <script type="text/babel" data-type="module">
    import App from './App.jsx';
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
